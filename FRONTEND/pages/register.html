<!DOCTYPE html>
<html>

<head>

    <title>Register - LuxyLane</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .register-box{
            background:white;
            padding:30px;
            width:300px;
            border-radius:10px;
        }

        input, select{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:15px;
            background:black;
            color:white;
            border:none;
        }

    </style>

</head>

<body>

<div class="register-box">

    <h2>Register</h2>

    <input
    type="text"
    id="username"
    placeholder="Username">

    <input
    type="email"
    id="email"
    placeholder="Email">

    <input
    type="password"
    id="password"
    placeholder="Password">

    <select id="role">

        <option value="customer">
            Customer
        </option>

        <option value="seller">
            Seller
        </option>

    </select>

    <button onclick="registerUser()">
        Register
    </button>

</div>

<script>

async function registerUser(){

    let username =
    document.getElementById("username").value;

    let email =
    document.getElementById("email").value;

    let password =
    document.getElementById("password").value;

    let role =
    document.getElementById("role").value;

    let response = await fetch(
        "http://localhost:5000/register",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body: JSON.stringify({

                username,
                email,
                password,
                role

            })

        }
    );

    let data = await response.text();

    alert(data);
}

</script>

</body>

</html>
