<!DOCTYPE html>
<html>

<head>

    <title>Login - LuxyLane</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:30px;
            width:300px;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:15px;
            background:black;
            color:white;
            border:none;
        }

    </style>

</head>

<body>

<div class="login-box">

    <h2>Login</h2>

    <input
    type="email"
    id="email"
    placeholder="Email">

    <input
    type="password"
    id="password"
    placeholder="Password">

    <button onclick="loginUser()">
        Login
    </button>

</div>

<script>

async function loginUser(){

    let email =
    document.getElementById("email").value;

    let password =
    document.getElementById("password").value;

    let response = await fetch(
        "https://luxylane-backend.onrender.com/products",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body: JSON.stringify({

                email,
                password

            })

        }
    );

    let data = await response.json();

    if(data.success){

        localStorage.setItem(
            "token",
            data.token
        );

        localStorage.setItem(
            "username",
            data.username
        );

        alert("Login Successful");

        window.location.href =
        "../index.html";

    }

    else{

        alert("Invalid Credentials");
    }

}

</script>

</body>

</html>
