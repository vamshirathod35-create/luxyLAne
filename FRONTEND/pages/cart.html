<!DOCTYPE html>
<html>

<head>

    <title>Cart - LuxyLane</title>

    <style>

        body{
            font-family:Arial;
            margin:0;
            background:#f4f4f4;
        }

        header{
            background:black;
            color:white;
            padding:20px;
            text-align:center;
        }

        .cart-container{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
            padding:20px;
        }

        .cart-card{
            background:white;
            width:250px;
            padding:20px;
            border-radius:10px;
        }

        img{
            width:100%;
            height:200px;
            object-fit:cover;
        }

        button{
            width:100%;
            padding:10px;
            background:black;
            color:white;
            border:none;
            margin-top:10px;
            cursor:pointer;
        }

        .checkout-box{
            background:white;
            padding:20px;
            margin:20px;
            border-radius:10px;
        }

    </style>

</head>

<body>

<header>

    <h1>Your Cart</h1>

</header>

<section
class="cart-container"
id="cart-container">

</section>

<div class="checkout-box">

    <h2 id="total-price">
        Total: ₹0
    </h2>

    <button onclick="placeOrder()">
        Place Order
    </button>

</div>

<script>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let token =
localStorage.getItem("token");

let container =
document.getElementById("cart-container");

let total = 0;

container.innerHTML = "";

cart.forEach((product) => {

    total += Number(product.price);

    container.innerHTML += `

    <div class="cart-card">

        <img src="${product.image}">

        <h2>${product.name}</h2>

        <h3>₹${product.price}</h3>

        <p>${product.description}</p>

    </div>

    `;

});

document.getElementById(
    "total-price"
).innerText =

"Total: ₹" + total;

async function placeOrder(){

    if(!token){

        alert("Please Login First");

        return;
    }

    let response = await fetch(

        "https://luxylane-backend.onrender.com/products",

        {

            method:"POST",

            headers:{

                "Content-Type":"application/json",

                "Authorization": token
            },

            body: JSON.stringify({

                products: cart,

                totalPrice: total

            })

        }

    );

    let data = await response.text();

    alert(data);

    if(
        data ===
        "Order Placed Successfully"
    ){

        localStorage.removeItem("cart");

        window.location.reload();
    }
}

</script>

</body>

</html>
